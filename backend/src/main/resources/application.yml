spring:
  application:
    name: codesense-ai-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/codesense
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Was hardcoded to "update" with no dev/prod distinction - every other
      # runtime knob in this file externalizes via an env var, this didn't.
      # Defaults are unchanged (still auto-migrates, still logs SQL) so this
      # is a no-op unless HIBERNATE_DDL_AUTO/JPA_SHOW_SQL are explicitly set -
      # switching the default itself to "validate" isn't safe to do blind,
      # since it's not known whether the deployed schema was ever created any
      # other way than by this exact setting.
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

cors:
  # Comma-separated. The browser's Origin header must match one of these
  # exactly (scheme+host+port) - see CorsConfig for why (Vercel's rewrite is
  # server-side, so the original browser origin still reaches us).
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://codesense-ai-phi.vercel.app}

user-identity:
  # Signs the server-issued X-User-Id (see UserIdentityService) so the
  # backend only ever honors ids it actually minted, not arbitrary
  # client-supplied strings. Left blank here on purpose - an ephemeral
  # per-process secret is generated automatically when unset (logged at
  # startup). Set USER_IDENTITY_SECRET to a long random value in production
  # so issued ids - and the history scoped to them - survive a restart/deploy.
  secret: ${USER_IDENTITY_SECRET:}

llm:
  provider: ${LLM_PROVIDER:github-models}   # anthropic | gemini | ollama | github-models

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: claude-sonnet-5

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: gemini-2.0-flash

ollama:
  model: ${OLLAMA_MODEL:llama3.2:1b}

github-models:
  token: ${GITHUB_MODELS_TOKEN:}
  model: ${GITHUB_MODELS_MODEL:openai/gpt-4o-mini}

rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  # Only trusted when the direct TCP peer's address matches one of these -
  # otherwise an external client could forge X-Forwarded-For to spoof its
  # source IP and dodge/frame another IP's limit. Add the reverse proxy's
  # address here once nginx/Caddy is in front of Spring Boot on the droplet.
  trusted-proxies: ${RATE_LIMIT_TRUSTED_PROXIES:127.0.0.1,::1}
  analyses:
    capacity: ${RATE_LIMIT_ANALYSES_CAPACITY:20}
    refill-tokens: ${RATE_LIMIT_ANALYSES_REFILL_TOKENS:20}
    refill-period-seconds: ${RATE_LIMIT_ANALYSES_REFILL_PERIOD_SECONDS:60}
  executions:
    capacity: ${RATE_LIMIT_EXECUTIONS_CAPACITY:10}
    refill-tokens: ${RATE_LIMIT_EXECUTIONS_REFILL_TOKENS:10}
    refill-period-seconds: ${RATE_LIMIT_EXECUTIONS_REFILL_PERIOD_SECONDS:60}
  # Single-record GET reads (/api/analyses/{id}, /api/executions/{id}) - a
  # plain DB read, so a much higher allowance than the POST endpoints above;
  # this is generic abuse/resource protection, not an authorization boundary
  # (see RateLimitFilter's javadoc).
  history-reads:
    capacity: ${RATE_LIMIT_HISTORY_READS_CAPACITY:120}
    refill-tokens: ${RATE_LIMIT_HISTORY_READS_REFILL_TOKENS:120}
    refill-period-seconds: ${RATE_LIMIT_HISTORY_READS_REFILL_PERIOD_SECONDS:60}

execution:
  sandbox:
    # local-process performs NO isolation - never use in an environment that
    # accepts untrusted input without Docker also enforced. Default is
    # local-process only because Docker isn't available in local dev here.
    type: ${EXECUTION_SANDBOX_TYPE:local-process}   # docker | local-process
    docker:
      image: ${EXECUTION_SANDBOX_IMAGE:codesense/execution-sandbox:latest}
      memory: ${EXECUTION_SANDBOX_MEMORY:256m}
      cpus: ${EXECUTION_SANDBOX_CPUS:1.0}
      # User-defined bridge network the sandbox container joins. Egress is
      # blocked by a host DOCKER-USER iptables rule, NOT by --network none
      # (which would also break the JDWP -p publish). Provision this network +
      # rule once via docker/execution-sandbox/provision-sandbox-network.sh
      # before enabling docker mode - if absent, the container has full
      # internet access. Linux deployment only; dev uses local-process.
      network: ${EXECUTION_SANDBOX_NETWORK:codesense-sandbox-net}
    readiness-timeout-seconds: ${EXECUTION_READINESS_TIMEOUT_SECONDS:10}
  python:
    # Blank = auto-detect (python3, then python, then py). Only used by
    # local-process mode; docker mode always runs python3 inside the image.
    executable: ${EXECUTION_PYTHON_EXECUTABLE:}
  limits:
    # Shared by both tracers (Java JDI and Python sys.settrace) - there's no
    # per-language knob. Raised from 2000: complex DSA code with larger inputs
    # (e.g. loops over hundreds of elements) was hitting the old cap and
    # truncating mid-run.
    max-steps: ${EXECUTION_MAX_STEPS:5000}
    max-stack-depth: ${EXECUTION_MAX_STACK_DEPTH:64}
    max-object-depth: ${EXECUTION_MAX_OBJECT_DEPTH:4}
    max-array-elements: ${EXECUTION_MAX_ARRAY_ELEMENTS:50}
    max-object-fields: ${EXECUTION_MAX_OBJECT_FIELDS:50}
    max-string-length: ${EXECUTION_MAX_STRING_LENGTH:1000}
    timeout-seconds: ${EXECUTION_TIMEOUT_SECONDS:10}
    max-console-output-bytes: ${EXECUTION_MAX_CONSOLE_OUTPUT_BYTES:65536}
